<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA Konum Doğrulama</title>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            border: 2px solid #00ff41;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            max-width: 400px;
            width: 100%;
            background-color: #000;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background-color: #222;
            border: 1px solid #00ff41;
            color: white;
            font-family: 'Courier New', monospace;
            text-align: center;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-gps { background-color: #238636; color: white; }
        .btn-coz { background-color: #00ff41; color: black; margin-top: 15px; }
        #sonuc { margin-top: 20px; font-weight: bold; display: none; padding: 10px; }
        .success { color: #00ff41; border: 1px dashed #00ff41; }
        .fail { color: #ff4444; border: 1px dashed #ff4444; }
        .bilgi { font-size: 11px; color: #555; margin-top: 20px;}
    </style>
</head>
<body>

<div class="container">
    <h2>📡 GÜVENLİ BÖLGE </h2>
    <p>Bu RSA şifresi sadece ATO Congresium Kongre ve Sergi Merkezi sınırları içerisinde çözülebilir.</p>
    
    <button class="btn-gps" onclick="gpsGetir()">📍 KONUM VERİSİNİ AL</button>
    
    <input type="text" id="koordinatInput" placeholder="Koordinatlar bekleniyor..." readonly>
    
    <button class="btn-coz" onclick="sifreyiCoz()">🔓 ŞİFRE ÇÖZMEYİ DENE</button>

    <div id="sonuc"></div>
    <div class="bilgi">TÜBİTAK 2204-A Projesi</div>
</div>

<script>
    // ATO Congresium Kongre ve Sergi Merkezi ve Çevresi Tolerans Ayarı
    // Bu değerler Kongre ve Sergi Merkezi genelini kapsar.
    const hedefEnlemBaslangic = "39.91"; 
    const hedefBoylamBaslangic = "32.80"; 

    function gpsGetir() {
        var input = document.getElementById("koordinatInput");
        input.value = "Uydudan veri alınıyor...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition, showError);
        } else {
            input.value = "Cihaz GPS desteklemiyor.";
        }
    }

    function showPosition(position) {
        var lat = position.coords.latitude.toFixed(5); 
        var lon = position.coords.longitude.toFixed(5);
        document.getElementById("koordinatInput").value = lat + ", " + lon;
    }

    function showError(error) {
        var input = document.getElementById("koordinatInput");
        switch(error.code) {
            case error.PERMISSION_DENIED:
                input.value = "Konum izni reddedildi.";
                alert("Lütfen tarayıcı ayarlarından konum izni verin.");
                break;
            case error.POSITION_UNAVAILABLE:
                input.value = "Konum bulunamadı.";
                break;
            case error.TIMEOUT:
                input.value = "Zaman aşımı.";
                break;
            default:
                input.value = "Bilinmeyen hata.";
        }
    }

    function sifreyiCoz() {
        var girilen = document.getElementById("koordinatInput").value.trim();
        var sonucDiv = document.getElementById("sonuc");
        
        // SADECE GPS KONTROLÜ (Hile yok!)
        var konumDogruMu = girilen.includes(hedefEnlemBaslangic) && girilen.includes(hedefBoylamBaslangic);

        if(konumDogruMu) {
            sonucDiv.style.display = "block";
            sonucDiv.innerHTML = "⏳ Koordinatlar Doğrulanıyor...";
            sonucDiv.className = "";
            
            setTimeout(function() {
                sonucDiv.innerHTML = "✅ ŞİFRE ÇÖZÜLDÜ!<br><br>Konum: ATO Congresium Kongre ve Sergi Merkezi Güvenli Bölge<br>Mesaj: 'Matematik koordinatlarda saklıdır!'";
                sonucDiv.className = "success";
            }, 1500); 
        } else {
            // Eğer koordinat kutusu boşsa veya yanlışsa
            if (girilen === "" || girilen.includes("bekleniyor") || girilen.includes("hata")) {
                 sonucDiv.innerHTML = "⚠️ Lütfen önce konum verisini alınız.";
                 sonucDiv.className = "fail";
                 sonucDiv.style.display = "block";
            } else {
                sonucDiv.style.display = "block";
                sonucDiv.innerHTML = "❌ ERİŞİM REDDEDİLDİ!<br>Güvenli Bölge Dışındasınız.<br>Şifre açılamaz.";
                sonucDiv.className = "fail";
            }
        }
    }
</script>

</body>
</html>
